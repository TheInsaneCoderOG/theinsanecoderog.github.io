<html>
  <head>
    <meta charset="utf-8">
    <title>Neural Network</title>
  </head>
  <body>
    <div id="ui" style="width:200px; height:250px; background-color:rgba(72,72,88,0.75); position:absolute; left:20px; top:20px;">
      <button onclick="closeUI()" id="closeUI" style="width:200px; height:30px; position:relative; top:250px;">Close UI</button>
    </div>
  <button onclick="openUI()" id="openUI" style="width:200px; height:30px; position:absolute; left: 20px; top: 20px;" hidden>Open UI</button>
  </body>
  <script>
    const ui = document.getElementById("ui")
    const buttonClose = document.getElementById("closeUI")
    const buttonOpen = document.getElementById("openUI")
    requestAnimationFrame(loop)
    
    function closeUI() {
      ui.hidden
      buttonClose.hidden
      buttonOpen.hidden = false
    }

    function openUI() {
      ui.hidden = false
      buttonClose.hidden = false
      buttonOpen.hidden
    }
    
    function loop() {
      requestAnimationFrame(loop)
    }
  </script>
</html>
