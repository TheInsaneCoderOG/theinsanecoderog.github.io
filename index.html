<html>
  <head>
    <meta charset="utf-8">
    <title>Neural Network</title>
    <link rel="stylesheet" href="styling.css">
  </head>
  <body>
    <div id="ui" class="ui">
      <button onclick="closeUI()" id="closeUI" class="closeUI">Close UI</button>
    </div>
  <button onclick="openUI()" id="openUI" class="openUI" hidden>Open UI</button>
  </body>
  <script>
    const ui = document.getElementById("ui")
    const buttonClose = document.getElementById("closeUI")
    const buttonOpen = document.getElementById("openUI")
    requestAnimationFrame(loop)
    
    function closeUI() {
      ui.hidden
      buttonClose.hidden
      buttonOpen.hidden = false
    }

    function openUI() {
      ui.hidden = false
      buttonClose.hidden = false
      buttonOpen.hidden
    }
    
    function loop() {
      requestAnimationFrame(loop)
    }
  </script>
</html>
